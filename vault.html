<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault — Visual Asset Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060606;
  --b:rgba(255,255,255,.08);--bs:rgba(255,255,255,.16);
  --t1:rgba(255,255,255,.88);--t2:rgba(255,255,255,.44);--t3:rgba(255,255,255,.22);
  --acc:rgba(255,255,255,.88);--acc-d:rgba(255,255,255,.08);--acc-g:rgba(255,255,255,.15);
  /* legacy compat names */
  --sb:transparent;--main:#060606;--card:rgba(255,255,255,.04);--card-h:rgba(255,255,255,.075);--panel:transparent;
  --red:#ff5f57;--yel:#febc2e;--grn:#28c840;
  --sbw:240px;--pw:280px;--tbh:48px;--cth:42px;--stb:26px;
  --f:'Jost',system-ui,sans-serif;--m:'DM Mono',monospace;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--f);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;font-size:13px;user-select:none}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 90% 70% at 15% 35%,rgba(255,255,255,.018) 0%,transparent 65%),radial-gradient(ellipse 60% 50% at 80% 10%,rgba(255,255,255,.012) 0%,transparent 55%),radial-gradient(ellipse 50% 45% at 90% 85%,rgba(255,255,255,.007) 0%,transparent 50%)}

/* LAYOUT */
.window{width:100vw;height:100vh;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1}
.app-body{flex:1;display:flex;overflow:hidden}

/* TITLEBAR */
.titlebar{height:var(--tbh);background:rgba(8,8,8,.65);backdrop-filter:blur(40px) saturate(160%);-webkit-backdrop-filter:blur(40px) saturate(160%);border-bottom:1px solid var(--b);box-shadow:inset 0 1px 0 rgba(255,255,255,.07),inset 0 -1px 0 rgba(0,0,0,.4);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;position:relative}
.tl{display:flex;gap:7px}
.tl-btn{width:12px;height:12px;border-radius:50%;cursor:pointer;border:none;transition:filter .15s;flex-shrink:0}
.tl-btn.r{background:var(--red)}.tl-btn.y{background:var(--yel)}.tl-btn.g{background:var(--grn)}
.tl-btn:hover{filter:brightness(1.15)}
.title-center{position:absolute;left:50%;transform:translateX(-50%);font-size:11px;font-weight:500;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;pointer-events:none}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:6px}

/* SIDEBAR */
.sidebar{width:var(--sbw);min-width:160px;max-width:400px;background:rgba(6,6,6,.6);backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%);border-right:1px solid var(--b);box-shadow:inset -1px 0 0 rgba(255,255,255,.04);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;position:relative;transition:width .2s}
.sb-resize{position:absolute;right:0;top:0;bottom:0;width:4px;cursor:col-resize;z-index:10;transition:background .15s}
.sb-resize:hover,.sb-resize.dragging{background:rgba(255,255,255,.08)}
.sb-inner{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 0 16px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.06) transparent}
.sb-inner::-webkit-scrollbar{width:3px}
.sb-inner::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:2px}
.sb-sec{margin-bottom:6px}
.sb-hd{padding:8px 16px 4px;font-size:9px;font-weight:600;color:var(--t3);letter-spacing:.16em;text-transform:uppercase}
.sb-item{display:flex;align-items:center;gap:7px;padding:5px 10px 5px 14px;cursor:pointer;border-radius:8px;margin:0 6px 1px;transition:background .12s,color .12s;font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden}
.sb-item:hover{background:rgba(255,255,255,.05);color:var(--t1)}
.sb-item.active{background:rgba(255,255,255,.09);color:var(--t1);box-shadow:inset 0 1px 0 rgba(255,255,255,.1),inset 0 -1px 0 rgba(0,0,0,.15)}
.sb-item svg{flex-shrink:0;opacity:.5}
.sb-item.active svg{opacity:.8}
.sb-item .ct{margin-left:auto;font-size:10px;color:var(--t3);font-family:var(--m);flex-shrink:0}
.sb-item.active .ct{color:rgba(255,255,255,.28)}
.sb-item .ind{margin-left:auto;width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.4);flex-shrink:0}

/* SIDEBAR LOGO */
.sb-logo{display:flex;align-items:center;gap:10px;padding:18px 14px 14px;border-bottom:1px solid var(--b);margin-bottom:4px;flex-shrink:0;cursor:pointer;transition:opacity .15s}
.sb-logo:hover{opacity:.75}
.sb-logo-mark{width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.11);box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 4px 12px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:rgba(255,255,255,.82);transition:background .2s,box-shadow .2s}
.sb-logo-mark:hover{background:rgba(255,255,255,.1);box-shadow:inset 0 1px 0 rgba(255,255,255,.2),0 6px 16px rgba(0,0,0,.4)}
.sb-logo-text{display:flex;flex-direction:column;gap:1px;min-width:0}
.sb-logo-name{font-size:13.5px;font-weight:600;color:var(--t1);letter-spacing:.02em;line-height:1.2}
.sb-logo-sub{font-size:9px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;line-height:1}

body.light .sb-logo{border-color:rgba(0,0,0,.08)}
body.light .sb-logo-mark{background:rgba(0,0,0,.06);border-color:rgba(0,0,0,.1);box-shadow:inset 0 1px 0 rgba(255,255,255,.8),0 4px 12px rgba(0,0,0,.08);color:rgba(0,0,0,.72)}
body.light .sb-logo-mark:hover{background:rgba(0,0,0,.09);box-shadow:inset 0 1px 0 rgba(255,255,255,.9),0 6px 16px rgba(0,0,0,.12)}

/* Collection tree */
.coll-group{position:relative}
.coll-toggle{width:14px;height:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t3);transition:transform .15s;flex-shrink:0}
.coll-toggle.open{transform:rotate(90deg)}
.coll-children{display:none;padding-left:10px}
.coll-children.open{display:block}

/* Tags */
.sb-tag{display:flex;align-items:center;gap:7px;padding:4px 10px 4px 14px;cursor:pointer;border-radius:8px;margin:0 6px 1px;transition:background .12s}
.sb-tag:hover{background:rgba(255,255,255,.04)}
.sb-tag.active{background:rgba(255,255,255,.08)}
.tag-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:rgba(255,255,255,.22)}
.tag-name{font-size:11.5px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sb-tag.active .tag-name{color:var(--t1)}
.tag-ct{font-size:10px;color:var(--t3);font-family:var(--m)}

/* Color swatches */
.color-row{display:flex;flex-wrap:wrap;gap:6px;padding:6px 16px 10px}
.csw{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;box-shadow:0 2px 6px rgba(0,0,0,.6)}
.csw:hover{transform:scale(1.2)}
.csw.active{border-color:rgba(255,255,255,.7);transform:scale(1.1)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Content toolbar */
.ct-bar{height:var(--cth);background:rgba(6,6,6,.55);backdrop-filter:blur(28px) saturate(160%);-webkit-backdrop-filter:blur(28px) saturate(160%);border-bottom:1px solid var(--b);box-shadow:inset 0 1px 0 rgba(255,255,255,.05),inset 0 -1px 0 rgba(0,0,0,.35);display:flex;align-items:center;padding:0 12px;gap:6px;flex-shrink:0}
.srch-w{flex:0 1 260px;position:relative}
.srch-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);pointer-events:none;display:flex}
.srch{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--b);border-radius:8px;padding:6px 10px 6px 30px;color:var(--t1);font-family:var(--f);font-size:12px;outline:none;transition:all .18s;box-shadow:inset 0 1px 3px rgba(0,0,0,.3)}
.srch:focus{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.22);box-shadow:inset 0 1px 3px rgba(0,0,0,.3),0 0 0 3px rgba(255,255,255,.06)}
.srch::placeholder{color:var(--t3)}
.tb-sep{width:1px;height:15px;background:rgba(255,255,255,.08);flex-shrink:0;margin:0 2px}
.tb-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:7px;cursor:pointer;color:var(--t3);transition:all .12s;border:none;background:transparent;flex-shrink:0}
.tb-btn:hover{background:rgba(255,255,255,.07);color:var(--t2)}
.tb-btn.on{background:rgba(255,255,255,.1);color:var(--t1);box-shadow:inset 0 1px 0 rgba(255,255,255,.15),inset 0 -1px 0 rgba(0,0,0,.2)}
.sort-wrap{position:relative}
.sort-btn{font-size:11.5px;padding:4px 9px;display:flex;align-items:center;white-space:nowrap;min-width:72px}
.sort-drop{position:fixed;background:rgba(12,12,12,.94);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:4px;min-width:120px;box-shadow:0 20px 56px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.1);z-index:1000;display:none;animation:menuPop .12s ease}
.sort-drop.show{display:block}
.sort-opt{padding:6px 10px;border-radius:7px;font-size:12px;color:var(--t1);cursor:pointer;transition:background .1s;white-space:nowrap}
.sort-opt:hover{background:rgba(255,255,255,.08)}
.sort-opt.active{color:var(--t1);background:rgba(255,255,255,.1)}
body.light .sort-drop{background:rgba(240,237,233,.97);border-color:rgba(0,0,0,.1);box-shadow:0 16px 48px rgba(0,0,0,.16),inset 0 1px 0 rgba(255,255,255,.95)}
body.light .sort-opt{color:rgba(0,0,0,.82)}
body.light .sort-opt:hover{background:rgba(0,0,0,.06)}
body.light .sort-opt.active{background:rgba(0,0,0,.08)}
.sz-w{display:flex;align-items:center;gap:6px;margin-left:auto}
.sz-lbl{font-size:9.5px;color:var(--t3);letter-spacing:.05em;text-transform:uppercase}
.sz-sl{width:76px;-webkit-appearance:none;height:2px;background:rgba(255,255,255,.1);border-radius:1px;outline:none;cursor:pointer}
.sz-sl::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.7);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.5),0 0 0 3px rgba(255,255,255,.08)}

/* Filter chips row */
.filter-row{display:flex;align-items:center;gap:5px;padding:6px 14px;border-bottom:1px solid var(--b);flex-wrap:wrap;flex-shrink:0;display:none}
.filter-row.visible{display:flex}
.fc{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:100px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--t1);font-size:11px;cursor:pointer;transition:background .12s}
.fc:hover{background:rgba(255,255,255,.12)}
.fc-lbl{font-size:10px;color:var(--t3);margin-right:2px}
.fc-clear{font-size:10.5px;color:var(--t3);cursor:pointer;padding:2px 6px;border-radius:4px;transition:color .12s}
.fc-clear:hover{color:var(--t1)}

/* GRID AREA */
.grid-area{flex:1;overflow-y:auto;padding:14px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.06) transparent}
.grid-area::-webkit-scrollbar{width:5px}
.grid-area::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:3px}

.img-grid{display:grid;gap:8px;grid-template-columns:repeat(auto-fill,minmax(var(--card-sz,230px),1fr))}
.img-list{display:flex;flex-direction:column;gap:2px}

/* IMAGE CARD */
.img-card{background:rgba(255,255,255,.04);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .2s cubic-bezier(.25,.46,.45,.94),box-shadow .2s,border-color .2s,background .2s,width .18s cubic-bezier(.25,.46,.45,.94),height .18s cubic-bezier(.25,.46,.45,.94);border:1px solid rgba(255,255,255,.07);position:relative;animation:fadeIn .3s ease both;box-shadow:0 2px 12px rgba(0,0,0,.35),inset 0 1px 0 rgba(255,255,255,.07)}
.img-card:hover{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.14);transform:translateY(-2px);box-shadow:0 16px 48px rgba(0,0,0,.55),0 4px 16px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.12)}
.img-card.sel{border-color:rgba(255,255,255,.38)!important;box-shadow:0 0 0 1px rgba(255,255,255,.28),0 8px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.2)!important}
.img-card.detail-open{border-color:rgba(255,255,255,.28);box-shadow:0 0 0 1px rgba(255,255,255,.18),inset 0 1px 0 rgba(255,255,255,.12)}

.tw{position:relative;overflow:hidden;background:#080808;transition:height .18s cubic-bezier(.25,.46,.45,.94)}
.tw img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .45s cubic-bezier(.25,.46,.45,.94)}
.img-card:hover .tw img{transform:scale(1.06)}
.tw-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(0,0,0,.72) 100%);opacity:0;transition:opacity .25s;pointer-events:none}
.img-card:hover .tw-overlay{opacity:1}

.card-check{position:absolute;top:7px;left:7px;width:17px;height:17px;border-radius:5px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;z-index:3;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.img-card:hover .card-check,.img-card.sel .card-check{opacity:1}
.img-card.sel .card-check{background:rgba(255,255,255,.88);border-color:rgba(255,255,255,.95)}
.check-mark{display:none;color:#000;font-size:9px;line-height:1;font-weight:700}
.img-card.sel .check-mark{display:block}

/* Bookmark button */
.card-fav{position:absolute;bottom:8px;right:8px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:7px;background:rgba(0,0,0,.52);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);opacity:0;transition:opacity .15s,background .15s,color .15s;z-index:3;cursor:pointer;color:rgba(255,255,255,.38);border:1px solid rgba(255,255,255,.1);box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
.img-card:hover .card-fav,.card-fav.on{opacity:1}
.card-fav.on{color:rgba(255,255,255,.92);background:rgba(255,255,255,.14);border-color:rgba(255,255,255,.24);box-shadow:inset 0 1px 0 rgba(255,255,255,.18)}

.card-info{padding:8px 10px 9px}
.card-nm{font-size:11.5px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;letter-spacing:.01em}
.card-tags{display:flex;flex-wrap:wrap;gap:3px}
.ctag{font-size:9.5px;padding:2px 7px;border-radius:100px;font-weight:500;white-space:nowrap;background:rgba(255,255,255,.07);color:rgba(255,255,255,.44);border:1px solid rgba(255,255,255,.09)}
.card-dots{display:flex;gap:3px;margin-top:6px}
.cdot{width:9px;height:9px;border-radius:50%;border:1px solid rgba(0,0,0,.5);box-shadow:0 1px 3px rgba(0,0,0,.5)}

/* MINIMAL MODE */
.grid-area.minimal{padding:2px}
.img-grid.minimal{gap:2px}
.minimal .img-card{border-radius:2px;background:transparent;border-color:transparent;box-shadow:none}
.minimal .img-card:hover{transform:none;box-shadow:none;background:rgba(255,255,255,.03)}
.minimal .img-card .card-info{display:none}
.minimal .img-card .tw-overlay{display:none}
.minimal .img-card .card-check{border-radius:3px}

/* LIST VIEW overrides */
.img-list .img-card{display:flex;align-items:center;gap:10px;padding:7px 12px;border-radius:9px;height:auto}
.img-list .img-card .tw{width:80px;height:45px;border-radius:6px;flex-shrink:0}
.img-list .img-card .tw img{width:100%;height:100%}
.img-list .img-card .card-info{padding:0;flex:1;min-width:0;display:flex;align-items:center;gap:14px}
.img-list .img-card .card-nm{margin:0;flex:1}
.img-list .img-card .card-tags{flex-shrink:0}
.img-list .img-card .card-dots{display:none}
.img-list .img-card .card-fav{position:static;opacity:1;background:transparent;backdrop-filter:none;border:none;box-shadow:none}
.img-list .img-card .tw-overlay{display:none}
.img-list .img-card .list-meta{font-family:var(--m);font-size:10.5px;color:var(--t3);flex-shrink:0;min-width:80px;text-align:right}

/* LIST + MINIMAL: full-width stacked images, no info */
.grid-area.minimal .img-list{gap:2px}
.grid-area.minimal .img-list .img-card{display:block;padding:0;border-radius:2px;height:auto}
.grid-area.minimal .img-list .img-card .tw{width:100%;height:auto;border-radius:0;flex-shrink:unset}
.grid-area.minimal .img-list .img-card .tw img{width:100%;height:auto;object-fit:cover;display:block}
.grid-area.minimal .img-list .img-card .card-info{display:none!important}
.grid-area.minimal .img-list .img-card .card-fav{display:none}
.grid-area.minimal .img-list .img-card .list-meta{display:none}

/* EMPTY STATE */
.empty{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--t3);padding:40px}
.empty-ico{font-size:44px;opacity:.1;line-height:1}
.empty-t{font-size:14px;font-weight:500;color:var(--t2)}
.empty-s{font-size:12px;text-align:center;max-width:200px;line-height:1.6}

/* RIGHT PANEL */
.rpanel{width:var(--pw);background:rgba(5,5,5,.7);backdrop-filter:blur(36px) saturate(160%);-webkit-backdrop-filter:blur(36px) saturate(160%);border-left:1px solid var(--b);box-shadow:inset 1px 0 0 rgba(255,255,255,.05);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .25s ease,opacity .2s ease}
.rpanel.closed{width:0;opacity:0;pointer-events:none}
.rp-inner{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.05) transparent;padding-bottom:24px}
.rp-inner::-webkit-scrollbar{width:3px}
.rp-inner::-webkit-scrollbar-thumb{background:rgba(255,255,255,.05);border-radius:2px}
.rp-preview{width:100%;aspect-ratio:4/3;background:#040404;overflow:hidden;position:relative;flex-shrink:0}
.rp-preview img{width:100%;height:100%;object-fit:contain;display:block}
.rp-empty-prev{width:100%;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;background:#040404;flex-direction:column;gap:8px;color:var(--t3)}
.rp-sec{padding:12px 16px;border-bottom:1px solid var(--b)}
.rp-sec:last-child{border-bottom:none}
.rp-lbl{font-size:9px;font-weight:600;color:var(--t3);letter-spacing:.14em;text-transform:uppercase;margin-bottom:7px}
.rp-val{font-size:12px;color:var(--t1);word-break:break-all;line-height:1.4}
.meta-g{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.meta-item .mk{font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;font-weight:500;margin-bottom:2px}
.meta-item .mv{font-family:var(--m);font-size:11px;color:var(--t1)}
.rp-colors{display:flex;gap:5px}
.rp-col{flex:1;height:24px;border-radius:6px;cursor:pointer;transition:transform .15s;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.18)}
.rp-col:hover{transform:scaleY(1.1)}
.rp-col-tip{position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:rgba(14,14,14,.95);backdrop-filter:blur(12px);border:1px solid var(--b);color:var(--t1);font-family:var(--m);font-size:10px;padding:2px 6px;border-radius:5px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s}
.rp-col:hover .rp-col-tip{opacity:1}

/* Panel tags */
.ptags{display:flex;flex-wrap:wrap;gap:5px}
.ptag{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:500;cursor:pointer;transition:background .15s;background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1)}
.ptag .px{opacity:.4;transition:opacity .12s;font-size:13px;line-height:1;margin-top:-.5px}
.ptag:hover .px{opacity:.8}
.add-tag{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:100px;font-size:11px;color:var(--t3);border:1px dashed rgba(255,255,255,.12);cursor:pointer;transition:all .12s}
.add-tag:hover{border-color:rgba(255,255,255,.3);color:var(--t2)}

/* Fullscreen overlay */
.fs-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(2px);z-index:3000;display:none;flex-direction:column;align-items:center;justify-content:center;cursor:zoom-out}
.fs-overlay.show{display:flex;animation:fadeIn .2s ease}
.fs-img-wrap{position:relative;max-width:92vw;max-height:86vh;display:flex;align-items:center;justify-content:center}
.fs-img-wrap img{max-width:92vw;max-height:86vh;object-fit:contain;border-radius:4px;box-shadow:0 48px 120px rgba(0,0,0,.9);cursor:default}
.fs-close{position:fixed;top:20px;right:24px;width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.08);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;z-index:3001;box-shadow:inset 0 1px 0 rgba(255,255,255,.12)}
.fs-close:hover{background:rgba(255,255,255,.15);color:#fff}
.fs-nav{position:fixed;top:50%;transform:translateY(-50%);width:40px;height:40px;background:rgba(255,255,255,.07);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7);font-size:20px;cursor:pointer;border-radius:10px;display:flex;align-items:center;justify-content:center;transition:all .15s;z-index:3001;box-shadow:inset 0 1px 0 rgba(255,255,255,.1)}
.fs-nav:hover{background:rgba(255,255,255,.15);color:#fff}
.fs-prev{left:20px}
.fs-next{right:20px}
.fs-info{position:fixed;bottom:0;left:0;right:0;padding:14px 24px;background:linear-gradient(transparent,rgba(0,0,0,.65));display:flex;align-items:center;gap:12px;z-index:3001;pointer-events:none}
.fs-name{font-size:14px;font-weight:500;color:#fff;letter-spacing:.01em}
.fs-meta{font-family:var(--m);font-size:11px;color:rgba(255,255,255,.4)}
.fs-counter{margin-left:auto;font-family:var(--m);font-size:11px;color:rgba(255,255,255,.28)}

/* Notes */
.notes-ta{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--b);border-radius:8px;color:var(--t1);font-family:var(--f);font-size:12px;padding:8px 10px;outline:none;resize:vertical;min-height:70px;transition:border-color .15s,box-shadow .15s;line-height:1.5;box-shadow:inset 0 1px 3px rgba(0,0,0,.3)}
.notes-ta:focus{border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.06);box-shadow:inset 0 1px 3px rgba(0,0,0,.3),0 0 0 3px rgba(255,255,255,.05)}
.notes-ta::placeholder{color:var(--t3)}

/* STATUS BAR */
.stbar{height:var(--stb);background:rgba(4,4,4,.7);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--b);box-shadow:inset 0 1px 0 rgba(255,255,255,.04);display:flex;align-items:center;padding:0 14px;gap:14px;font-size:10.5px;color:var(--t3);flex-shrink:0;font-family:var(--m)}
.st-sep{opacity:.22}

/* CONTEXT MENU */
.ctx{position:fixed;background:rgba(12,12,12,.92);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:4px;min-width:170px;box-shadow:0 24px 64px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.1);z-index:1000;display:none;animation:menuPop .12s ease}
.ctx.show{display:block}
.ctx-it{display:flex;align-items:center;gap:9px;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--t1);transition:background .1s}
.ctx-it:hover{background:rgba(255,255,255,.08)}
.ctx-it.danger{color:#ff7070}
.ctx-it.danger:hover{background:rgba(255,100,100,.08)}
.ctx-sep{height:1px;background:rgba(255,255,255,.07);margin:3px 0}
.ctx-ico{font-size:12px;width:16px;text-align:center;opacity:.65}
.ctx-sub{font-size:11px;color:var(--t3);margin-left:auto;padding-left:8px}

/* IMPORT COLLECTION LIST */
.import-coll-opt{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;cursor:pointer;font-size:13px;color:var(--t1);transition:background .12s;border:1px solid transparent}
.import-coll-opt:hover{background:rgba(255,255,255,.07);border-color:var(--b)}
.import-coll-opt .ico{font-size:15px;line-height:1;flex-shrink:0}
.import-coll-opt .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.import-coll-opt .indent{width:16px;flex-shrink:0}
body.light .import-coll-opt:hover{background:rgba(0,0,0,.05);border-color:rgba(0,0,0,.1)}

/* ICON PICKER POPOVER */
.icon-picker{position:fixed;background:rgba(12,12,12,.94);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:8px;display:grid;grid-template-columns:repeat(7,1fr);gap:3px;box-shadow:0 24px 64px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.1);z-index:1100;animation:menuPop .12s ease}
.icon-picker button{width:30px;height:30px;border:none;background:transparent;border-radius:7px;font-size:16px;cursor:pointer;transition:background .1s;display:flex;align-items:center;justify-content:center;line-height:1}
.icon-picker button:hover{background:rgba(255,255,255,.1)}
body.light .icon-picker{background:rgba(240,237,233,.97);border-color:rgba(0,0,0,.1);box-shadow:0 20px 60px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.95)}
body.light .icon-picker button:hover{background:rgba(0,0,0,.07)}

/* TAG DROPDOWN */
.tag-drop{position:fixed;background:rgba(12,12,12,.93);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:8px;min-width:190px;box-shadow:0 24px 64px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.1);z-index:1001;display:none}
.tag-drop.show{display:block;animation:menuPop .12s ease}
.td-search{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:7px;color:var(--t1);font-family:var(--f);font-size:12px;padding:5px 9px;outline:none;margin-bottom:6px;transition:border-color .15s}
.td-search:focus{border-color:rgba(255,255,255,.22)}
.td-list{max-height:190px;overflow-y:auto;scrollbar-width:thin}
.td-opt{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:6px;cursor:pointer;transition:background .1s;font-size:12px;color:var(--t2)}
.td-opt:hover{background:rgba(255,255,255,.07);color:var(--t1)}
.td-del{margin-left:auto;padding:0 3px;font-size:14px;line-height:1;color:var(--t3);border-radius:3px;flex-shrink:0;opacity:0;transition:opacity .1s,color .1s}
.td-opt:hover .td-del{opacity:1}
.td-del:hover{color:#ff7070!important}
.td-create{color:var(--t2);font-style:italic}
.td-opt.has{background:rgba(255,255,255,.09);color:var(--t1)}
.td-check{width:14px;text-align:center;font-size:10px}

/* MOVE TO COLLECTION SUBMENU */
.coll-drop{position:fixed;background:rgba(12,12,12,.93);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:4px;min-width:170px;box-shadow:0 24px 64px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.1);z-index:1002;display:none}
.coll-drop.show{display:block;animation:menuPop .12s ease}
.cd-it{padding:6px 10px;border-radius:8px;cursor:pointer;font-size:12px;color:var(--t2);transition:background .1s}
.cd-it:hover{background:rgba(255,255,255,.07);color:var(--t1)}

/* TOAST */
.toast{position:fixed;bottom:44px;left:50%;transform:translateX(-50%) translateY(14px);background:rgba(18,18,18,.92);backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:9px 16px;font-size:12px;color:var(--t1);box-shadow:0 16px 48px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.1);z-index:2000;opacity:0;transition:all .25s ease;pointer-events:none;display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-ico{font-size:13px}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;font-family:var(--f);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;border:none;letter-spacing:.01em}
.btn-acc{background:rgba(255,255,255,.11);color:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.18);box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 4px 14px rgba(0,0,0,.35)}
.btn-acc:hover{background:rgba(255,255,255,.17);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.24),0 6px 18px rgba(0,0,0,.45)}
.btn-ghost{background:rgba(255,255,255,.05);color:var(--t2);border:1px solid var(--b);box-shadow:inset 0 1px 0 rgba(255,255,255,.07)}
.btn-ghost:hover{background:rgba(255,255,255,.09);color:var(--t1)}

/* MODAL OVERLAY */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);z-index:900;display:none;align-items:center;justify-content:center}
.modal-bg.show{display:flex;animation:fadeIn .18s ease}
.modal{background:rgba(14,14,14,.93);backdrop-filter:blur(48px) saturate(180%);-webkit-backdrop-filter:blur(48px) saturate(180%);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:24px;min-width:340px;max-width:440px;box-shadow:0 36px 90px rgba(0,0,0,.75),inset 0 1px 0 rgba(255,255,255,.12);animation:slideUp .22s ease}
.modal-t{font-size:15px;font-weight:600;color:var(--t1);margin-bottom:6px;letter-spacing:.01em}
.modal-s{font-size:12px;color:var(--t2);margin-bottom:18px;line-height:1.5}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes menuPop{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* Staggered card fade */
.img-card:nth-child(1){animation-delay:0ms}.img-card:nth-child(2){animation-delay:20ms}.img-card:nth-child(3){animation-delay:40ms}.img-card:nth-child(4){animation-delay:60ms}.img-card:nth-child(5){animation-delay:80ms}.img-card:nth-child(6){animation-delay:100ms}.img-card:nth-child(7){animation-delay:120ms}.img-card:nth-child(8){animation-delay:140ms}

  const h=[...tag].reduce((a,c)=>a+c.charCodeAt(0),0);

// Dynamic tag list: tags used on images + user's custom tags, deduplicated & sorted
function getAllTags() {
  const fromImages = new Set();
  state.images.forEach(i => i.tags.forEach(t => fromImages.add(t)));
  const all = new Set([...fromImages, ...state.customTags]);
  return [...all].sort((a,b)=>a.localeCompare(b));
}
function getUnusedCustomTags() {
  const used = new Set(state.images.flatMap(i=>i.tags));

  ctxTarget: null,
  customTags: [], // user-created tags persisted across sessions
};

// Flatten all collection IDs (including children)
function allCollIds(colls) {
  const ids = [];
  function walk(list) { list.forEach(c=>{ids.push(c.id);walk(c.children||[]);}); }
  walk(colls);
  return ids;
}

function getCollectionById(id, list=state.collections) {
  for (const c of list) {
    if (c.id===id) return c;
    const found = getCollectionById(id, c.children||[]);
    if (found) return found;
  }
  return null;
}

// Return all collection IDs in the subtree rooted at id (inclusive)
function collSubtreeIds(id) {
  const ids = [id];
  const coll = findCollById(state.collections, id);
  if (coll?.children?.length) coll.children.forEach(c=>ids.push(...collSubtreeIds(c.id)));
  return ids;
}

function countForCollection(id) {
  if (id==='all') return state.images.length;
  if (id==='recent') return state.images.filter(i=>new Date(i.date)>new Date(Date.now()-7*864e5)).length;
  if (id==='starred') return state.images.filter(i=>i.favorite).length;
  if (id==='untagged') return state.images.filter(i=>!i.tags.length).length;
  const subtree = collSubtreeIds(id);
  return state.images.filter(i=>subtree.includes(i.collection)).length;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// FILTERING & SORTING
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function getFilteredImages() {
  let imgs = [...state.images];

  // Collection filter
  if (state.activeCollection==='recent') imgs = imgs.filter(i=>new Date(i.date)>new Date(Date.now()-30*864e5));
  else if (state.activeCollection==='starred') imgs = imgs.filter(i=>i.favorite);
  else if (state.activeCollection==='untagged') imgs = imgs.filter(i=>!i.tags.length);
  else if (state.activeCollection!=='all') {
    // Include children
    const childIds = [];
    function gatherChildren(id) {
      childIds.push(id);
      const c = getCollectionById(id);
      if (c) (c.children||[]).forEach(ch=>gatherChildren(ch.id));
    }
    gatherChildren(state.activeCollection);
    imgs = imgs.filter(i=>childIds.includes(i.collection));
  }

  // Tag filter
  if (state.activeTags.length) {
    imgs = imgs.filter(i=>state.activeTags.every(t=>i.tags.includes(t)));
  }

  // Color filter (approximate — match any image color close to filter)
  if (state.activeColor) {
    const fc = hexToRgb(state.activeColor);
    imgs = imgs.filter(i=>i.colors.some(c=>{
      const ic = hexToRgb(c);
      return ic && colorDist(fc,ic)<120;
    }));
  }

  // Search
  const q = state.searchQuery.trim().toLowerCase();
  if (q) {
    imgs = imgs.filter(i=>
      i.name.toLowerCase().includes(q) ||
      i.tags.some(t=>t.toLowerCase().includes(q)) ||
      (i.notes||'').toLowerCase().includes(q)
    );
  }

  // Sort
  const [sortKey,sortDir] = state.sortBy.split('-');
  imgs.sort((a,b)=>{
    let va,vb;
    if (sortKey==='date'){va=new Date(a.date);vb=new Date(b.date);}
    else if (sortKey==='name'){va=a.name;vb=b.name;}
    else if (sortKey==='rating'){va=a.name;vb=b.name;}
    else if (sortKey==='size'){va=parseFloat(a.size);vb=parseFloat(b.size);}
    else {va=a.name;vb=b.name;}
    if (va<vb) return sortDir==='asc'?-1:1;
    if (va>vb) return sortDir==='asc'?1:-1;
    return 0;
  });

  return imgs;
}

function hexToRgb(hex){
  const m=hex.match(/^#([0-9a-f]{6})$/i);
  if(!m)return null;
  return{r:parseInt(m[1].slice(0,2),16),g:parseInt(m[1].slice(2,4),16),b:parseInt(m[1].slice(4,6),16)};
}
function colorDist(a,b){return Math.sqrt((a.r-b.r)**2+(a.g-b.g)**2+(a.b-b.b)**2);}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// COLUMN CALCULATION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function getCols() {
  const sz = state.thumbSize;
  if (state.viewMode==='list') return 1;
  const map = {1:7,2:5,3:4,4:3,5:2};
  return map[sz]||4;
}

// COLLECTION TREE HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function findCollById(colls, id) {
  for (const c of colls) {
    if (c.id === id) return c;
    if (c.children?.length) { const f = findCollById(c.children, id); if (f) return f; }
  }
  return null;
}

function deleteCollById(colls, id) {
  const idx = colls.findIndex(c => c.id === id);
  if (idx !== -1) { colls.splice(idx, 1); return true; }
  for (const c of colls) {
    if (c.children?.length && deleteCollById(c.children, id)) return true;
  }
  return false;
}

const ICON_EMOJIS = ['📁','📂','🖼','🎨','🎭','🎬','🎵','🎮','📷','🌿','🌊','🌆','🌙','⭐','🔥','⚡','💎','🔮','🏗','🏛','🏠','🎯','📌','🖌','✏️','🗂','📦','🔬','🌐','🎪'];

function showIconPicker(e, collId) {
  document.querySelector('.icon-picker')?.remove();
  const picker = document.createElement('div');
  picker.className = 'icon-picker';
  ICON_EMOJIS.forEach(em => {
    const btn = document.createElement('button');
    btn.textContent = em;
    btn.title = em;
    btn.addEventListener('click', () => {
      const coll = findCollById(state.collections, collId);
      if (coll) { coll.icon = em; renderAllAndSave(); }
      picker.remove();
    });
    picker.appendChild(btn);
  });
  document.body.appendChild(picker);
  // Position near click, keep in viewport
  const pw = 7 * 33 + 16, ph = Math.ceil(ICON_EMOJIS.length / 7) * 33 + 16;
  let x = e.clientX, y = e.clientY + 8;
  if (x + pw > window.innerWidth - 8) x = window.innerWidth - pw - 8;
  if (y + ph > window.innerHeight - 8) y = e.clientY - ph - 8;
  picker.style.left = x + 'px';
  picker.style.top = y + 'px';
  const dismiss = ev => { if (!picker.contains(ev.target)) { picker.remove(); document.removeEventListener('mousedown', dismiss); } };
  setTimeout(() => document.addEventListener('mousedown', dismiss), 10);
}

function showCollCtxMenu(e, collId) {
  e.preventDefault();
  e.stopPropagation();
  const coll = findCollById(state.collections, collId);
  if (!coll) return;
  const menu = document.getElementById('ctxMenu');
  menu.innerHTML = `
    <div class="ctx-it" id="cctx-sub"><span class="ctx-ico">📁</span>New Sub-collection</div>
    <div class="ctx-it" id="cctx-icon"><span class="ctx-ico">😀</span>Change Icon</div>
    <div class="ctx-sep"></div>
    <div class="ctx-it danger" id="cctx-del"><span class="ctx-ico">🗑</span>Delete Collection</div>
  `;
  positionMenu(menu, e.clientX, e.clientY);
  menu.classList.add('show');
  menu.querySelector('#cctx-sub').onclick = () => { closeCtx(); showSubCollModal(collId); };
  menu.querySelector('#cctx-icon').onclick = () => { closeCtx(); showIconPicker(e, collId); };
  menu.querySelector('#cctx-del').onclick = () => {

function renderCollTree(colls, depth) {
  let html = '';
  colls.forEach(c=>{
    const isActive = state.activeCollection===c.id;
    const hasChildren = c.children && c.children.length>0;
    const isExp = state.expandedColls.has(c.id);
    const cnt = countForCollection(c.id);
    html += `<div class="coll-group">
      <div class="sb-item${isActive?' active':''}" data-coll="${c.id}" style="padding-left:${14+depth*10}px">
        ${hasChildren?`<span class="coll-toggle${isExp?' open':''}" data-toggle="${c.id}">▶</span>`:`<span style="width:14px;flex-shrink:0"></span>`}
        <span style="margin-right:4px;font-size:13px;line-height:1">${c.icon}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis">${c.name}</span>
        <span class="ct">${cnt}</span>
      </div>
      ${hasChildren?`<div class="coll-children${isExp?' open':''}">${renderCollTree(c.children,depth+1)}</div>`:''}
    </div>`;
  });
  return html;
}

    return;
  }

  const containerClass = vm==='grid'?'img-grid':'img-list';

  // Extract real colors from loaded images
  area.querySelectorAll('img[data-imgid]').forEach(imgEl=>{
    const id = imgEl.dataset.imgid;
    if (imgEl.complete && imgEl.naturalWidth > 0) {
      extractAndApplyColors(imgEl, id);
    } else {
      imgEl.addEventListener('load', ()=>extractAndApplyColors(imgEl, id), {once:true});
    }
  });
}

function extractAndApplyColors(imgEl, id) {
  try {
    const W = 120, H = 90;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(imgEl, 0, 0, W, H);
    const data = ctx.getImageData(0, 0, W, H).data;

    // Pixel quantization → 6 dominant, visually distinct colors
    const counts = new Map();
    for (let i = 0; i < data.length; i += 16) {
      if (data[i+3] < 128) continue; // skip transparent
      const qr = Math.round(data[i]   / 24) * 24;
      const qg = Math.round(data[i+1] / 24) * 24;
      const qb = Math.round(data[i+2] / 24) * 24;
      const key = `${qr},${qg},${qb}`;
      counts.set(key, (counts.get(key)||0) + 1);
    }
    const sorted = [...counts.entries()].sort((a,b)=>b[1]-a[1]);
    const palette = [];
    for (const [key] of sorted) {
      const [r,g,b] = key.split(',').map(Number);
      const tooClose = palette.some(([pr,pg,pb])=>{
        const d=Math.sqrt((r-pr)**2+(g-pg)**2+(b-pb)**2); return d<55;
      });
      if (!tooClose) { palette.push([r,g,b]); if (palette.length>=6) break; }
    }
    const colors = palette.map(([r,g,b])=>
      '#'+[r,g,b].map(v=>Math.min(255,v).toString(16).padStart(2,'0')).join('')
    );

    // Store back into image data for panel use
    const img = getImg(id);
    if (img) img.colors = colors;

    // Update dots in the card without full re-render
    const dotsEl = document.getElementById('dots-'+id);
    if (dotsEl) {
      dotsEl.innerHTML = colors.map(c=>`<span class="cdot" style="background:${c}"></span>`).join('');
    }

    // If this is the active image, refresh the panel colors section only
    if (String(state.activeImageId)===String(id)) {
      const rpColors = document.querySelector('.rp-colors');
      if (rpColors) {
        rpColors.innerHTML = colors.map(c=>`<div class="rp-col" data-hex="${c}" style="background:${c}" title="Click to copy ${c}"><span class="rp-col-tip">${c}</span></div>`).join('');
        rpColors.querySelectorAll('.rp-col[data-hex]').forEach(sw=>{
          sw.addEventListener('click',()=>{
            navigator.clipboard.writeText(sw.dataset.hex).catch(()=>{
              const ta=document.createElement('textarea');ta.value=sw.dataset.hex;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
            });
            showToast(`Copied ${sw.dataset.hex}`);
          });
        });
      }
    }
  } catch(e) {
    // CORS or tainted canvas — silently keep placeholder colors
  }
}

function renderCard(img, vm) {
  const isSel = state.selectedIds.map(String).includes(String(img.id));
  const isDetail = String(state.activeImageId)===String(img.id);
  const ar = img.tw/img.th;
  const gridAR = vm==='grid'?'4/3':null;

  const tags = img.tags.slice(0,3).map(t=>{
    const c = tagColor(t);
    return `<span class="ctag">${t}</span>`;
  }).join('');

  const dots = img.colors.slice(0,6).map(c=>`<span class="cdot" style="background:${c}"></span>`).join('');

  if (vm==='list') {
    return `<div class="img-card${isSel?' sel':''}${isDetail?' detail-open':''}" data-id="${img.id}">
      <div class="card-check"><span class="check-mark">✓</span></div>
      <div class="tw">
        <img src="${img.fileUrl || `https://picsum.photos/seed/${img.seed}/120/90`}" alt="${img.name}">
      </div>
      <div class="card-info">
        <div class="card-nm">${img.name}</div>
        <div class="card-tags">${tags}</div>
        <span class="list-meta">${img.w}×${img.h}</span>
        <span class="list-meta" style="min-width:60px">${img.size}</span>
        <span class="list-meta" style="min-width:90px">${img.date}</span>
        <button class="card-fav${img.favorite?' on':''}" data-fav="${img.id}" title="${img.favorite?'Remove from favorites':'Add to favorites'}">${img.favorite?'<svg width="11" height="13" viewBox="0 0 11 13" fill="currentColor"><path d="M1.5 1.5h8v10l-4-2.5-4 2.5v-10z" rx="1"/></svg>':'<svg width="11" height="13" viewBox="0 0 11 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M1.5 1.5h8v10l-4-2.5-4 2.5v-10z"/></svg>'}</button>
      </div>
    </div>`;
  }

  const thumbW = 800;
  const thumbH = 600;
  const style = gridAR?`aspect-ratio:${gridAR}`:`aspect-ratio:${ar}`;

  return `<div class="img-card${isSel?' sel':''}${isDetail?' detail-open':''}" data-id="${img.id}">
    <div class="card-check"><span class="check-mark">✓</span></div>
    <div class="tw" style="${style}">
      <img src="${img.fileUrl || `https://picsum.photos/seed/${img.seed}/${thumbW}/${thumbH}`}" alt="${img.name}" crossorigin="anonymous" data-imgid="${img.id}">
      <div class="tw-overlay"></div>
    </div>
    <button class="card-fav${img.favorite?' on':''}" data-fav="${img.id}" title="${img.favorite?'Remove from favorites':'Add to favorites'}">${img.favorite?'<svg width="11" height="13" viewBox="0 0 11 13" fill="currentColor"><path d="M1.5 1.5h8v10l-4-2.5-4 2.5v-10z" rx="1"/></svg>':'<svg width="11" height="13" viewBox="0 0 11 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M1.5 1.5h8v10l-4-2.5-4 2.5v-10z"/></svg>'}</button>
    <div class="card-info">
      <div class="card-nm">${img.name}</div>
      <div class="card-tags">${tags}</div>
      <div class="card-dots" id="dots-${img.id}">${dots}</div>
    </div>
  </div>`;
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// RENDER PANEL
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderPanel() {
  const el = document.getElementById('rpInner');
  const img = getImg(state.activeImageId);

  if (!img) {
    el.innerHTML = `<div class="rp-empty-prev">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" stroke="currentColor" stroke-width="1.5" opacity=".3"><rect x="3" y="3" width="22" height="22" rx="3"/><circle cx="10" cy="10" r="2.5"/><path d="M3 19l7-7 4 4 3-3 8 8"/></svg>
      <span style="font-size:12px;color:var(--t3)">Select an image</span>
    </div>`;
    return;
  }

  const tagPills = img.tags.map(t=>{
    const c = tagColor(t);
    return `<span class="ptag" data-ptag="${t}">
      ${t}<span class="px" title="Remove">×</span>
    </span>`;
  }).join('');

  const colorSwatches = img.colors.map(c=>`<div class="rp-col" data-hex="${c}" style="background:${c}" title="Click to copy ${c}"><span class="rp-col-tip">${c}</span></div>`).join('');

  // Find collection name
  const coll = getCollectionById(img.collection);
  const collName = coll ? coll.name : img.collection;

  el.innerHTML = `
    <div class="rp-preview" id="rpPreview" style="cursor:zoom-in" title="Click to fullscreen">
      <img src="${img.fileUrl || `https://picsum.photos/seed/${img.seed}/${img.tw}/${img.th}`}" alt="${img.name}" id="rpPreviewImg">
    </div>

    <div class="rp-sec" style="display:flex;align-items:flex-start;gap:8px">
      <div style="flex:1">
        <div class="rp-val" style="font-size:13px;font-weight:600;margin-bottom:4px">${img.name}</div>
        <div style="font-size:11px;color:var(--t3)">in ${collName}</div>
      </div>
      <button id="rpFavBtn" title="${img.favorite?'Remove from favorites':'Add to favorites'}" style="flex-shrink:0;background:rgba(255,255,255,${img.favorite?'.1':'.04'});border:1px solid rgba(255,255,255,${img.favorite?'.2':'.08'});border-radius:7px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:${img.favorite?'rgba(255,255,255,.9)':'rgba(255,255,255,.3)'};padding:0;transition:all .15s">${img.favorite?'<svg width="11" height="13" viewBox="0 0 11 13" fill="currentColor"><path d="M1.5 1.5h8v10l-4-2.5-4 2.5v-10z"/></svg>':'<svg width="11" height="13" viewBox="0 0 11 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M1.5 1.5h8v10l-4-2.5-4 2.5v-10z"/></svg>'}</button>
    </div>

    <div class="rp-sec">
      <div class="rp-lbl">Metadata</div>
      <div class="meta-g">
        <div class="meta-item"><div class="mk">Dimensions</div><div class="mv">${img.w}×${img.h}</div></div>
        <div class="meta-item"><div class="mk">File Size</div><div class="mv">${img.size}</div></div>
        <div class="meta-item"><div class="mk">Date Added</div><div class="mv">${img.date}</div></div>
        <div class="meta-item"><div class="mk">Aspect Ratio</div><div class="mv">${(img.w/img.h).toFixed(2)}:1</div></div>
      </div>
    </div>

    <div class="rp-sec">
      <div class="rp-lbl">Colors</div>
      <div class="rp-colors">${colorSwatches}</div>
    </div>

    <div class="rp-sec">
      <div class="rp-lbl">Tags</div>
      <div class="ptags" id="panelTags">
        ${tagPills}
        <span class="add-tag" id="addTagBtn">+ Add tag</span>
      </div>
    </div>

    <div class="rp-sec">
      <div class="rp-lbl">Notes</div>
      <textarea class="notes-ta" id="notesTA" placeholder="Add notes…">${img.notes||''}</textarea>
    </div>
  `;

  // Click color swatch → copy hex to clipboard
  el.querySelectorAll('.rp-col[data-hex]').forEach(sw=>{
    sw.addEventListener('click', ()=>{
      const hex = sw.dataset.hex;
      navigator.clipboard.writeText(hex).then(()=>{
        showToast(`Copied ${hex}`);
      }).catch(()=>{
        // fallback for older Electron contexts
        const ta = document.createElement('textarea');
        ta.value = hex; ta.style.position='fixed'; ta.style.opacity='0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
        showToast(`Copied ${hex}`);
      });
    });
  });

  // Favorite toggle in panel
  document.getElementById('rpFavBtn').addEventListener('click', ()=>{
    img.favorite = !img.favorite;
    renderAllAndSave();
  });

  // Fullscreen on preview click
  document.getElementById('rpPreview').addEventListener('click', ()=>openFullscreen(img.id));

  // Remove tag
  el.querySelectorAll('[data-ptag]').forEach(p=>{
    p.querySelector('.px').addEventListener('click', e=>{
      e.stopPropagation();
      const t = p.dataset.ptag;
      img.tags = img.tags.filter(x=>x!==t);
      renderAllAndSave();
    });
  });

  // Add tag
  document.getElementById('addTagBtn').addEventListener('click', e=>{
    showTagDropdown(e.target, img);
  });

  // Notes — debounced save
  document.getElementById('notesTA').addEventListener('input', e=>{
    img.notes = e.target.value;
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(persistData, 800);
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// FILTER ROW
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderFilterRow() {
  const row = document.getElementById('filterRow');
  const chips = [];

  if (state.activeTags.length) {
    state.activeTags.forEach(t=>{
      const c = tagColor(t);
      chips.push(`<span class="fc" data-rm-tag="${t}">🏷 ${t} ×</span>`);
    });
  }
  if (state.activeColor) {
    chips.push(`<span class="fc" data-rm-color style="gap:6px"><span style="width:10px;height:10px;border-radius:50%;background:${state.activeColor};display:inline-block"></span>Color ×</span>`);
  }
  if (state.searchQuery) {
    chips.push(`<span class="fc" data-rm-search>🔍 "${state.searchQuery}" ×</span>`);
  }

  if (chips.length) {
    row.innerHTML = `<span class="fc-lbl">Filters:</span>${chips.join('')}<span class="fc-clear" id="clearAll">Clear all</span>`;
    row.classList.add('visible');
    row.querySelectorAll('[data-rm-tag]').forEach(c=>c.addEventListener('click',()=>{toggleTag(c.dataset.rmTag);}));
    row.querySelector('[data-rm-color]')?.addEventListener('click',()=>{state.activeColor=null;renderAll();});
    row.querySelector('[data-rm-search]')?.addEventListener('click',()=>{state.searchQuery='';document.getElementById('searchInput').value='';renderAll();});
    row.querySelector('#clearAll')?.addEventListener('click',()=>{state.activeTags=[];state.activeColor=null;state.searchQuery='';document.getElementById('searchInput').value='';renderAll();});
  } else {
    row.innerHTML = '';
    row.classList.remove('visible');
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// FULLSCREEN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let fsCurrentId = null;
let hoveredCardId = null;

function openFullscreen(id) {
  const img = getImg(id);
  if (!img) return;
  fsCurrentId = id;
  const overlay = document.getElementById('fsOverlay');
  const fsImg = document.getElementById('fsImg');
  const fsName = document.getElementById('fsName');
  const fsMeta = document.getElementById('fsMeta');
  const fsCounter = document.getElementById('fsCounter');

  fsImg.src = img.fileUrl || `https://picsum.photos/seed/${img.seed}/${img.tw}/${img.th}`;
  fsImg.alt = img.name;
  fsName.textContent = img.name;
  fsMeta.textContent = `${img.w}×${img.h} · ${img.size} · ${img.date}`;

  const filtered = getFilteredImages();
  const idx = filtered.findIndex(i=>String(i.id)===String(id));
  fsCounter.textContent = `${idx+1} / ${filtered.length}`;

  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeFullscreen() {
  document.getElementById('fsOverlay').classList.remove('show');
  document.body.style.overflow = '';
  fsCurrentId = null;
}

function fsNavigate(dir) {
  const filtered = getFilteredImages();
  const idx = filtered.findIndex(i=>i.id===fsCurrentId);
  if (idx < 0) return;
  const next = filtered[(idx + dir + filtered.length) % filtered.length];
  openFullscreen(next.id);
}

// Fullscreen event bindings
document.getElementById('fsClose').addEventListener('click', closeFullscreen);
document.getElementById('fsPrev').addEventListener('click', e=>{e.stopPropagation();fsNavigate(-1);});
document.getElementById('fsNext').addEventListener('click', e=>{e.stopPropagation();fsNavigate(1);});
document.getElementById('fsOverlay').addEventListener('click', e=>{
  if (e.target===e.currentTarget || e.target===document.getElementById('fsImg')) closeFullscreen();
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CONTEXT MENU
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function showCtxMenu(e, id) {
  e.preventDefault();
  e.stopPropagation();
  state.ctxTarget = id;
  const img = getImg(id);
  if (!img) return;

  const collOptions = allCollIds(state.collections).map(cid=>{
    const c = getCollectionById(cid);
    return c ? `<div class="cd-it" data-move="${cid}">${c.icon} ${c.name}</div>` : '';
  }).join('');

  const menu = document.getElementById('ctxMenu');
  menu.innerHTML = `
    <div class="ctx-it" id="ctx-open"><span class="ctx-ico">👁</span>View Details</div>
    <div class="ctx-it" id="ctx-tags"><span class="ctx-ico">🏷</span>Add Tags<span class="ctx-sub">→</span></div>
    <div class="ctx-it" id="ctx-move"><span class="ctx-ico">📁</span>Move to Collection<span class="ctx-sub">→</span></div>
    <div class="ctx-it" id="ctx-fav"><span class="ctx-ico">${img.favorite?'<svg width="10" height="12" viewBox="0 0 11 13" fill="currentColor"><path d="M1.5 1.5h8v10l-4-2.5-4 2.5v-10z"/></svg>':'<svg width="10" height="12" viewBox="0 0 11 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M1.5 1.5h8v10l-4-2.5-4 2.5v-10z"/></svg>'}</span>${img.favorite?'Remove from Favorites':'Add to Favorites'}</div>
    <div class="ctx-sep"></div>
    <div class="ctx-it" id="ctx-sel"><span class="ctx-ico">${state.selectedIds.includes(id)?'✓':''}</span>${state.selectedIds.includes(id)?'Deselect':'Select'}</div>
    ${state.selectedIds.length>1?'<div class="ctx-it" id="ctx-selmv"><span class="ctx-ico">📦</span>Move '+state.selectedIds.length+' selected</div>':''}
    <div class="ctx-sep"></div>
    <div class="ctx-it danger" id="ctx-del"><span class="ctx-ico">🗑</span>Delete</div>
  `;

  positionMenu(menu, e.clientX, e.clientY);
  menu.classList.add('show');

  menu.querySelector('#ctx-open').onclick = ()=>{ state.activeImageId=id; renderAll(); closeCtx(); };
  menu.querySelector('#ctx-tags').onclick = (ev)=>{ showTagDropdown(ev.currentTarget, img); closeCtx(); };
  menu.querySelector('#ctx-move').onclick = (ev)=>{ showCollDropdown(ev.currentTarget, img); closeCtx(); };
  menu.querySelector('#ctx-fav').onclick = ()=>{ img.favorite=!img.favorite; renderAllAndSave(); closeCtx(); };
  menu.querySelector('#ctx-sel').onclick = ()=>{
    if (state.selectedIds.includes(id)) state.selectedIds=state.selectedIds.filter(x=>x!==id);
    else state.selectedIds.push(id);
    renderAll(); closeCtx();
  };
  menu.querySelector('#ctx-del').onclick = ()=>{
    state.images = state.images.filter(i=>String(i.id)!==String(id));
    state.selectedIds = state.selectedIds.filter(x=>String(x)!==String(id));
    if (String(state.activeImageId)===String(id)) state.activeImageId=null;
    renderAllAndSave(); closeCtx();
    showToast('🗑 Image deleted','#ff5f57');
  };
}

function showTagDropdown(anchor, img) {
  const drop = document.getElementById('tagDrop');

  function rebuildDrop(query='') {
    const allTags = getAllTags();
    const q = query.toLowerCase().trim();
    const filtered = q ? allTags.filter(t=>t.toLowerCase().includes(q)) : allTags;
    const exactMatch = allTags.some(t=>t.toLowerCase()===q);
    const unusedCustom = new Set(getUnusedCustomTags());

    let inner = '';
    filtered.forEach(t=>{
      const has = img.tags.includes(t);
      const isUnused = unusedCustom.has(t);
      inner += `<div class="td-opt${has?' has':''}" data-topt="${t}">
        <span class="td-check">${has?'✓':''}</span>
        <span class="tag-dot"></span>
        <span style="flex:1">${t}</span>
        ${isUnused?`<span class="td-del" data-deltag="${t}" title="Remove tag">×</span>`:''}
      </div>`;
    });
    // "Create new tag" row
    if (q && !exactMatch) {
      inner += `<div class="td-opt td-create" data-newtag="${q}">
        <span class="td-check">+</span>
        <span class="tag-dot" style="opacity:.4"></span>
        <span>Create "<strong>${q}</strong>"</span>
      </div>`;
    }
    if (!inner) inner = `<div style="padding:6px 8px;font-size:11px;color:var(--t3)">No tags yet — type to create one</div>`;

    drop.innerHTML = `<input class="td-search" id="tdSearch" placeholder="Search or create tag…" autocomplete="off" value="${query}">
      <div class="td-list">${inner}</div>`;

    const rect = anchor.getBoundingClientRect();
    positionMenu(drop, rect.left, rect.bottom+4);
    drop.classList.add('show');

    const inp = document.getElementById('tdSearch');
    inp.focus();
    inp.setSelectionRange(inp.value.length, inp.value.length);

    inp.addEventListener('input', e => rebuildDrop(e.target.value));
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const val = inp.value.trim().toLowerCase().replace(/\s+/g,'-');
        if (!val) return;
        if (!img.tags.includes(val)) img.tags.push(val);
        if (!state.customTags.includes(val)) state.customTags.push(val);
        renderAllAndSave();
        rebuildDrop('');
      }
      if (e.key === 'Escape') { drop.classList.remove('show'); }
    });

    // Toggle existing tag
    drop.querySelectorAll('.td-opt[data-topt]').forEach(o=>{
      o.addEventListener('click', e=>{
        if (e.target.closest('.td-del')) return; // handled below
        const t = o.dataset.topt;
        if (img.tags.includes(t)) img.tags=img.tags.filter(x=>x!==t);
        else img.tags.push(t);
        renderAllAndSave();
        rebuildDrop(inp?.value||'');
      });
    });

    // Delete unused custom tag
    drop.querySelectorAll('.td-del[data-deltag]').forEach(btn=>{
      btn.addEventListener('click', e=>{
        e.stopPropagation();
        const t = btn.dataset.deltag;
        state.customTags = state.customTags.filter(x=>x!==t);
        renderAllAndSave();
        rebuildDrop(inp?.value||'');
      });
    });

    // Create new tag via click
    drop.querySelectorAll('.td-create[data-newtag]').forEach(o=>{
      o.addEventListener('click', ()=>{
        const t = o.dataset.newtag.toLowerCase().replace(/\s+/g,'-');
        if (!img.tags.includes(t)) img.tags.push(t);
        if (!state.customTags.includes(t)) state.customTags.push(t);
        renderAllAndSave();
        rebuildDrop('');
      });
    });
  }

  rebuildDrop();
}

function showCollDropdown(anchor, img) {
  const drop = document.getElementById('collDrop');
  const ids = allCollIds(state.collections);
  let html = '';
  ids.forEach(cid=>{
    const c = getCollectionById(cid);
    if (!c) return;
    const depth = getCollDepth(cid);
    html += `<div class="cd-it" data-cid="${cid}" style="padding-left:${10+depth*10}px">${c.icon} ${c.name}</div>`;
  });
  drop.innerHTML = html;

  const rect = anchor.getBoundingClientRect();
  positionMenu(drop, rect.left, rect.bottom+4);
  drop.classList.add('show');

  drop.querySelectorAll('.cd-it').forEach(it=>{
    it.addEventListener('click', ()=>{
      img.collection = it.dataset.cid;
      renderAll();
      drop.classList.remove('show');
      showToast(`📁 Moved to ${getCollectionById(it.dataset.cid)?.name}`);
    });
  });
}

function getCollDepth(id, list=state.collections, d=0) {
  for (const c of list) {
    if (c.id===id) return d;
    const found = getCollDepth(id, c.children||[], d+1);
    if (found>=0) return found;
  }
  return -1;
}

function positionMenu(menu, x, y) {
  menu.style.left = x+'px';
  menu.style.top = y+'px';
  menu.style.right = 'auto';
  menu.style.bottom = 'auto';
  // Ensure on screen after display
  requestAnimationFrame(()=>{
    const r = menu.getBoundingClientRect();
    if (r.right>window.innerWidth) menu.style.left = (window.innerWidth-r.width-8)+'px';
    if (r.bottom>window.innerHeight) menu.style.top = (y-r.height-4)+'px';
  });
}

// CARD INTERACTIONS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function handleCardClick(e, id) {
  if (e.shiftKey) {
    // Range select — normalize all IDs to string for safe comparison
    const filtered = getFilteredImages();
    const ids = filtered.map(i=>String(i.id));
    const anchor = state.selectedIds.length
      ? String(state.selectedIds[state.selectedIds.length-1])
      : String(id);
    const a = ids.indexOf(anchor);
    const b = ids.indexOf(String(id));
    if (a>=0 && b>=0) {
      const range = ids.slice(Math.min(a,b), Math.max(a,b)+1);
      range.forEach(rid=>{ if (!state.selectedIds.map(String).includes(rid)) state.selectedIds.push(rid); });
    } else {
      state.selectedIds = [id];
    }
    renderGrid();
    updateStatus();
    return;
  }
  if (e.metaKey || e.ctrlKey) {
    if (state.selectedIds.includes(id)) state.selectedIds=state.selectedIds.filter(x=>x!==id);
    else state.selectedIds.push(id);
    renderGrid();
    updateStatus();
    return;
  }
  // Single click
  state.selectedIds = [id];
  state.activeImageId = id;
  renderAll();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
(function initSidebarResize() {
  const handle = document.getElementById('sbResize');
  const sidebar = document.getElementById('sidebar');
  let startX, startW;
  handle.addEventListener('mousedown', e=>{
    startX = e.clientX;
    startW = sidebar.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    function onMove(e) {
      const w = Math.max(160, Math.min(400, startW+(e.clientX-startX)));
      sidebar.style.width = w+'px';
    }
    function onUp() {
      handle.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// KEYBOARD SHORTCUTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.addEventListener('keydown', e=>{
  if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if (e.key==='Escape') {
    if (fsCurrentId !== null) { closeFullscreen(); return; }
    state.selectedIds=[];
    state.activeImageId=null;
    closeCtx(); closeDropdowns();
    renderAll();
  }
  if (e.key===' ') {
    e.preventDefault();
    if (fsCurrentId !== null) { closeFullscreen(); return; }
    if (hoveredCardId !== null) { openFullscreen(hoveredCardId); return; }
    if (state.activeImageId !== null) { openFullscreen(state.activeImageId); return; }
    return;
  }
  if (fsCurrentId !== null) {
    if (e.key==='ArrowRight'||e.key==='ArrowDown') { e.preventDefault(); fsNavigate(1); }
    if (e.key==='ArrowLeft'||e.key==='ArrowUp') { e.preventDefault(); fsNavigate(-1); }
    return;
  }
  if (e.key==='1') setViewMode('grid');
  if (e.key==='2') setViewMode('list');
  if ((e.metaKey||e.ctrlKey)&&e.key==='a') {
    e.preventDefault();
    const filtered = getFilteredImages();
    state.selectedIds = filtered.map(i=>i.id);
    renderGrid();
    updateStatus();
  }
  // Delete selected
  if ((e.key==='Delete'||e.key==='Backspace')&&state.selectedIds.length) {
    const n = state.selectedIds.length;
    state.images = state.images.filter(i=>!state.selectedIds.map(String).includes(String(i.id)));
    state.selectedIds=[];
    if (state.activeImageId && !state.images.find(i=>String(i.id)===String(state.activeImageId))) state.activeImageId=null;
    renderAllAndSave();
    showToast(`🗑 ${n} image${n>1?'s':''} deleted`,var_red);
  }
});

const MOON_SVG = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M11.5 8.5A5 5 0 1 1 5.5 2.5a3.5 3.5 0 0 0 6 6z"/></svg>`;
const SUN_SVG  = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="2.8"/><line x1="7" y1="1" x2="7" y2="2.2"/><line x1="7" y1="11.8" x2="7" y2="13"/><line x1="1" y1="7" x2="2.2" y2="7"/><line x1="11.8" y1="7" x2="13" y2="7"/><line x1="2.93" y1="2.93" x2="3.76" y2="3.76"/><line x1="10.24" y1="10.24" x2="11.07" y2="11.07"/><line x1="11.07" y1="2.93" x2="10.24" y2="3.76"/><line x1="3.76" y1="10.24" x2="2.93" y2="11.07"/></svg>`;

let isDark = true;
function applyTheme() {
  document.body.classList.toggle('light', !isDark);
  document.getElementById('themeToggle').innerHTML = isDark ? MOON_SVG : SUN_SVG;
}
document.getElementById('themeToggle').addEventListener('click', ()=>{
  isDark = !isDark;
  applyTheme();
});
applyTheme();

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// DRAG & DROP IMPORT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// Add images coming back from the Electron main process (real file paths)
function addElectronImages(electronImgs) {
  const coll = ['all','recent','starred','untagged'].includes(state.activeCollection)
    ? null : state.activeCollection;
  electronImgs.forEach(img => {
    img.collection = coll;
    // Resolve image dimensions client-side once loaded
    const probe = new Image();
    probe.onload = () => {
      img.w = probe.naturalWidth;
      img.h = probe.naturalHeight;
      persistData();
    };
    probe.src = img.fileUrl;
    state.images.unshift(img);
  });
  renderAllAndSave();
  showToast(`✓ Imported ${electronImgs.length} image${electronImgs.length > 1 ? 's' : ''}`);
}

// Browser/web fallback: use object URLs (not persisted)
function importFiles(files, forceColl) {
  const imgs = files.filter(f => f.type.startsWith('image/'));
  if (!imgs.length) return;
  const coll = (forceColl !== undefined) ? forceColl
    : (['all','recent','starred','untagged'].includes(state.activeCollection) ? null : state.activeCollection);
  imgs.forEach((f) => {
    const uid = `web_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
    const objectUrl = URL.createObjectURL(f);
    const probe = new Image();
    probe.onload = () => {
      const entry = state.images.find(i => i.id === uid);
      if (entry) { entry.w = probe.naturalWidth; entry.h = probe.naturalHeight; renderAll(); }
    };
    probe.src = objectUrl;
    state.images.unshift({
      id: uid,
      name: f.name.replace(/\.[^.]+$/, ''),
      fileUrl: objectUrl,
      size: (f.size / 1048576).toFixed(1) + ' MB',
      date: new Date().toISOString().slice(0, 10),
      tags: [], collection: coll, favorite: false,
      colors: [], notes: '', w: 0, h: 0
    });
  });
  renderAllAndSave();
  showToast(`✓ Imported ${imgs.length} image${imgs.length > 1 ? 's' : ''}`);
}

let dragCounter = 0;
const dragOverlay = document.getElementById('dragOverlay');

window.addEventListener('dragenter', e => {
  if (!e.dataTransfer.types.includes('Files')) return;
  dragCounter++;
  dragOverlay.classList.add('show');
  e.preventDefault();
});
window.addEventListener('dragleave', e => {
  dragCounter--;
  if (dragCounter <= 0) { dragCounter = 0; dragOverlay.classList.remove('show'); }
});
window.addEventListener('dragover', e => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
});
window.addEventListener('drop', async e => {
  e.preventDefault();
  dragCounter = 0;
  dragOverlay.classList.remove('show');

  if (typeof IS_ELECTRON !== 'undefined' && IS_ELECTRON) {
    const paths = Array.from(e.dataTransfer.files)
      .map(f => f.path)
      .filter(p => p && /\.(jpe?g|png|gif|webp|tiff?|bmp|heic|heif|avif|svg)$/i.test(p));
    if (!paths.length) return;
    const imported = await window.electronAPI.importDroppedFiles(paths);
    if (imported && imported.length) showImportCollPicker(imported);
  } else {
    const files = Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('image/'));
    if (files.length) showImportCollPickerBrowser(files);
  }
});

// ── Import collection picker ──
function flattenCollections(colls, depth=0) {
  const out = [];
  colls.forEach(c => {
    out.push({...c, depth});
    if (c.children?.length) out.push(...flattenCollections(c.children, depth+1));
  });
  return out;
}

function buildImportCollList(onPick) {
  const list = document.getElementById('importCollList');
  list.innerHTML = '';

  // "No collection" option
  const none = document.createElement('div');
  none.className = 'import-coll-opt';
  none.innerHTML = `<span class="ico">📥</span><span class="nm" style="color:var(--t2)">No collection (inbox)</span>`;
  none.addEventListener('click', () => { document.getElementById('importCollModal').classList.remove('show'); onPick(null); });
  list.appendChild(none);

  // Flat collection tree
  flattenCollections(state.collections).forEach(c => {
    const row = document.createElement('div');
    row.className = 'import-coll-opt';
    row.innerHTML = `${'<span class="indent"></span>'.repeat(c.depth)}<span class="ico">${c.icon||'📂'}</span><span class="nm">${c.name}</span>`;
    row.addEventListener('click', () => { document.getElementById('importCollModal').classList.remove('show'); onPick(c.id); });
    list.appendChild(row);
  });
}

function showImportCollPicker(electronImgs) {
  const n = electronImgs.length;
  document.getElementById('importCollCount').textContent = `Where would you like to add ${n} image${n!==1?'s':''}?`;
  buildImportCollList(collId => {
    electronImgs.forEach(img => { img.collection = collId; });
    addElectronImages(electronImgs);
  });
  document.getElementById('importCollModal').classList.add('show');
}

function showImportCollPickerBrowser(files) {
  const n = files.length;
  document.getElementById('importCollCount').textContent = `Where would you like to add ${n} image${n!==1?'s':''}?`;
  buildImportCollList(collId => importFiles(files, collId));
  document.getElementById('importCollModal').classList.add('show');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ELECTRON BRIDGE  (must be last — needs isDark, applyTheme, renderAll etc.)
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const IS_ELECTRON = !!(window.electronAPI && window.electronAPI.isElectron);

// Debounced persistence — saves to disk (Electron) or localStorage (browser)
let _saveTimer;
function persistData() {
  const payload = {
    images: state.images,
    collections: state.collections,
    customTags: state.customTags,
    settings: { viewMode: state.viewMode, viewStyle: state.viewStyle, isDark, thumbSize: state.thumbSize }
  };
  if (IS_ELECTRON) {
    window.electronAPI.saveData(payload);
  } else {
    try { localStorage.setItem('vault-data', JSON.stringify(payload)); } catch(e) {}
  }
}
// Convenience: render then schedule a save
function renderAllAndSave() {
  renderAll();
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(persistData, 400);
}

if (IS_ELECTRON) {
  // ── Hide the HTML traffic-light buttons (native ones from main.js are used) ──
  const tlEl = document.querySelector('.tl');
  if (tlEl) tlEl.style.visibility = 'hidden';

  // ── Make titlebar draggable (window drag region) ──
  const ds = document.createElement('style');
  ds.textContent = `.titlebar{-webkit-app-region:drag}.titlebar *{-webkit-app-region:no-drag}`;
  document.head.appendChild(ds);

  // ── Wire app-menu commands sent from main.js ──
  window.electronAPI.onMenuImport(()       => document.getElementById('importBtn').click());
  window.electronAPI.onMenuNewCollection(()=> document.getElementById('newCollBtn').click());
  window.electronAPI.onMenuReveal(()       => {
    const sel = state.images.find(i => state.selectedIds.includes(i.id));
    if (sel?.filePath) window.electronAPI.revealFile(sel.filePath);
  });
  window.electronAPI.onSetView(v   => setViewMode(v));
  window.electronAPI.onSetStyle(v  => setViewStyle(v));
  window.electronAPI.onToggleTheme(()=> { isDark = !isDark; applyTheme(); persistData(); });
  window.electronAPI.onSelectAll(()  => {
    state.selectedIds = getFilteredImages().map(i => i.id);
    renderAll(); updateStatus(getFilteredImages());
  });
}

// ── Load persisted data, then do the real first render ──
(async function initVault() {
  let loaded = null;

  if (IS_ELECTRON) {
    try { loaded = await window.electronAPI.loadData(); } catch(e) {}
  } else {
    try { const r = localStorage.getItem('vault-data'); if (r) loaded = JSON.parse(r); } catch(e) {}
  }

  if (loaded) {
    // Only replace demo images if we have real saved images
    if (Array.isArray(loaded.images) && loaded.images.length) state.images = loaded.images;
    if (Array.isArray(loaded.collections) && loaded.collections.length) state.collections = loaded.collections;
    if (Array.isArray(loaded.customTags)) state.customTags = loaded.customTags;
    if (loaded.settings) {
      if (loaded.settings.viewMode)  state.viewMode  = loaded.settings.viewMode;
      if (loaded.settings.viewStyle) state.viewStyle = loaded.settings.viewStyle;
      if (typeof loaded.settings.isDark === 'boolean') { isDark = loaded.settings.isDark; applyTheme(); }
      if (loaded.settings.thumbSize) {
        // Migrate old 1-5 step values to pixel equivalents
        const old = loaded.settings.thumbSize;
        const szMigrate = {1:130,2:190,3:230,4:320,5:460};
        state.thumbSize = (old >= 1 && old <= 5 && Number.isInteger(old)) ? (szMigrate[old] || 230) : old;
        document.getElementById('sizeSlider').value = state.thumbSize;
      }
    }
    renderAll(); // re-render with loaded data
  }
  // (First render already happened at script startup via renderAll() + applyTheme() above)
})();
</script>
